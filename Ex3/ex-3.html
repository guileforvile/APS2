<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 01</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: #084d59;
            margin: 40px;
        }

        h1 {
            color: #000000;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .tarja {
            background-color: #c1d5d8;
            color: #000000;
            padding: 10px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Estilização dos links de texto */
        a {
            color: #084d59;
            text-decoration: none;
        }

        a:hover {
            color: #f7941d; /* Cor laranja ao passar o mouse */
        }

        hr {
            border: 0;
            border-top: 2px solid #5d8a94;
            margin: 40px 0 20px 0;
        }

        /* Estilização dos links com imagens (botões) */
        .botoes {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .botoes a img {
            border: 3px solid transparent; /* Borda invisível por padrão para não pular o layout */
        }

        .botoes a:hover img {
            border: 3px solid #f7941d; /* Borda laranja ao passar o mouse */
        }
    </style>
</head>
<body>

    <h1>Página 01</h1>

    <div class="tarja">Trabalhando com links</div>

    <p><a href="pagina2.html">ir para a página Links 02</a></p>
    <p><a href="https://www.sp.senac.br" target="_blank">Senac São Paulo</a></p>
    <p><a href="mailto:analauragomes@gmail.com">mande sua mensagem (analauragomes@gmail.com)</a></p>

    <hr>

    <div class="tarja">Trabalhando com links em imagens</div>

    <div class="botoes">
        <a href="pagina2.html"><img src="btn1.png" alt="outra página"></a>
        <a href="https://www.sp.senac.br" target="_blank"><img src="btn2.png" alt="site do senac são paulo"></a>
        <a href="mailto:analauragomes@gmail.com"><img src="btn3.png" alt="contato email"></a>
    </div>

</body>
</html>
